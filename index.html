<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERA Chatbot</title>
  <meta name="description" content="ERA Chatbot — a professional AI assistant powered by Groq and LangChain." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Tokens ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #000000;
      --surface:   #0a0a0a;
      --surface2:  #151515;
      --border:    rgba(255,255,255,.08);
      --accent:    #a0a0a0;
      --accent2:   #c8c8c8;
      --user-bg:   linear-gradient(135deg,#2a2a2a,#3a3a3a);
      --bot-bg:    #111111;
      --text:      #e5e5e5;
      --muted:     #6b6b6b;
      --radius:    16px;
      --shadow:    0 8px 40px rgba(0,0,0,.7);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Background Glow ────────────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(255,255,255,.03) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 80% 85%, rgba(255,255,255,.02) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
      padding: 0 12px;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 4px 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg,#1a1a1a,#2d2d2d);
      border: 1px solid rgba(255,255,255,.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.02em;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
      flex-shrink: 0;
    }

    .header-text h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -.02em; }
    .header-text p  { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    .badge {
      margin-left: auto;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      color: #999;
      font-size: .68rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 99px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    /* ── Message list ───────────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 4px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── Bubble wrapper ─────────────────────────────────────────────────── */
    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: fadeUp .3s ease both;
    }
    .msg.user { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Avatar ─────────────────────────────────────────────────────────── */
    .avatar {
      width: 32px; height: 32px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .msg.user .avatar { background: var(--user-bg); }
    .msg.bot  .avatar { background: var(--surface2); border: 1px solid var(--border); }

    /* ── Bubble ─────────────────────────────────────────────────────────── */
    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: .9rem;
      line-height: 1.65;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      color: #e5e5e5;
      border-bottom-right-radius: 4px;
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }
    .msg.bot .bubble {
      background: var(--bot-bg);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    .msg-time {
      font-size: .65rem;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 4px;
      align-self: flex-end;
    }

    /* ── Typing indicator ───────────────────────────────────────────────── */
    .typing-dots {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 16px;
    }
    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0);   opacity: .4; }
      40%           { transform: translateY(-6px); opacity: 1;  }
    }

    /* ── Empty state ────────────────────────────────────────────────────── */
    #empty-state {
      margin: auto;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: var(--muted);
    }
    #empty-state .icon {
      font-size: 48px;
      filter: drop-shadow(0 0 20px rgba(255,255,255,.15));
    }
    #empty-state h2 { font-size: 1.3rem; color: var(--text); font-weight: 600; }
    #empty-state p  { font-size: .85rem; max-width: 340px; line-height: 1.6; }

    .suggestion-chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: .78rem;
      padding: 8px 14px;
      border-radius: 99px;
      cursor: pointer;
      transition: all .2s;
    }
    .chip:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.2);
      color: #fff;
    }

    /* ── Input bar ──────────────────────────────────────────────────────── */
    #input-area {
      padding: 12px 0 20px;
      border-top: 1px solid var(--border);
    }

    #input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 12px;
      transition: border-color .2s, box-shadow .2s;
    }
    #input-row:focus-within {
      border-color: rgba(255,255,255,.18);
      box-shadow: 0 0 0 3px rgba(255,255,255,.04);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      resize: none;
      max-height: 140px;
      line-height: 1.5;
    }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: none;
      background: var(--user-bg);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .2s, transform .15s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { opacity: .85; transform: scale(1.05); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    #char-hint {
      text-align: right;
      font-size: .68rem;
      color: var(--muted);
      margin-top: 6px;
      padding-right: 4px;
    }

    /* ── No-memory notice ───────────────────────────────────────────────── */
    .notice {
      text-align: center;
      font-size: .7rem;
      color: var(--muted);
      padding: 6px 0 0;
    }
    .notice span {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      color: #777;
      padding: 3px 10px;
      border-radius: 99px;
    }

    /* ── Error toast ────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #ff4d6d;
      color: #fff;
      padding: 10px 20px;
      border-radius: 99px;
      font-size: .85rem;
      font-weight: 500;
      transition: transform .3s ease;
      z-index: 9999;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <header>
    <div class="logo">E</div>
    <div class="header-text">
      <h1>ERA Chatbot</h1>
      <p>Powered by Groq &middot; Llama 3.3 70B</p>
    </div>
    <div class="badge">Stateless</div>
  </header>

  <!-- Messages -->
  <div id="messages">
    <div id="empty-state">
      <div class="icon">&#9672;</div>
      <h2>Welcome to ERA</h2>
      <p>Your AI assistant powered by <strong>Groq</strong>. Each message is an independent query — fast, private, stateless.</p>
      <div class="suggestion-chips">
        <button class="chip" onclick="sendChip(this)">Explain quantum computing</button>
        <button class="chip" onclick="sendChip(this)">Write a Python function</button>
        <button class="chip" onclick="sendChip(this)">Tell me a fun fact</button>
        <button class="chip" onclick="sendChip(this)">What is LangChain?</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div id="input-area">
    <div id="input-row">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Ask me anything…"
        aria-label="Chat message input"
        maxlength="2000"
      ></textarea>
      <button id="send-btn" aria-label="Send message" onclick="sendMessage()">
        &#9658;
      </button>
    </div>
    <div id="char-hint">0 / 2000</div>
    <div class="notice">
      <span>Stateless mode -- every message is independent</span>
    </div>
  </div>
</div>

<!-- Error toast -->
<div id="toast"></div>

<script>
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const charHint    = document.getElementById('char-hint');
  const emptyState  = document.getElementById('empty-state');
  const toast       = document.getElementById('toast');

  let toastTimer = null;

  // ── Auto-resize textarea ────────────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    charHint.textContent = `${inputEl.value.length} / 2000`;
  });

  // ── Send on Enter (Shift+Enter = newline) ───────────────────────────────
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Chip shortcut ────────────────────────────────────────────────────────
  function sendChip(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  // ── Helpers ──────────────────────────────────────────────────────────────
  function timeNow() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(text, role) {
    if (emptyState.parentNode) emptyState.remove();

    const wrapper = document.createElement('div');
    wrapper.classList.add('msg', role);

    const avatar = document.createElement('div');
    avatar.classList.add('avatar');
    avatar.textContent = role === 'user' ? '🧑' : '🤖';

    const col = document.createElement('div');
    col.style.display = 'flex';
    col.style.flexDirection = 'column';

    const bubble = document.createElement('div');
    bubble.classList.add('bubble');
    bubble.textContent = text;

    const time = document.createElement('div');
    time.classList.add('msg-time');
    time.textContent = timeNow();

    col.appendChild(bubble);
    col.appendChild(time);

    if (role === 'user') {
      wrapper.appendChild(col);
      wrapper.appendChild(avatar);
    } else {
      wrapper.appendChild(avatar);
      wrapper.appendChild(col);
    }

    messagesEl.appendChild(wrapper);
    scrollBottom();
    return bubble;
  }

  function showTyping() {
    if (emptyState.parentNode) emptyState.remove();
    const wrapper = document.createElement('div');
    wrapper.classList.add('msg', 'bot');
    wrapper.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.classList.add('avatar');
    avatar.textContent = '🤖';

    const dots = document.createElement('div');
    dots.classList.add('bubble', 'typing-dots');
    dots.innerHTML = '<span></span><span></span><span></span>';

    wrapper.appendChild(avatar);
    wrapper.appendChild(dots);
    messagesEl.appendChild(wrapper);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
  }

  function setBusy(busy) {
    sendBtn.disabled = busy;
    inputEl.disabled = busy;
  }

  // ── Main send ────────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    // Reset input
    inputEl.value = '';
    inputEl.style.height = 'auto';
    charHint.textContent = '0 / 2000';

    appendMessage(text, 'user');
    showTyping();
    setBusy(true);

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      const data = await res.json();

      removeTyping();

      if (!res.ok || data.error) {
        showToast('⚠️ ' + (data.error || 'Server error. Please try again.'));
      } else {
        appendMessage(data.response, 'bot');
      }
    } catch (err) {
      removeTyping();
      showToast('⚠️ Could not reach the server. Is app.py running?');
    } finally {
      setBusy(false);
      inputEl.focus();
    }
  }
</script>
</body>
</html>
